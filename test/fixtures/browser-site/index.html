<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentDock Browser Fixture</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; color: #222; }
    h1 { color: #333; }
    .counter { font-size: 48px; font-weight: bold; color: #6c63ff; }
    button { padding: 10px 18px; border: 0; border-radius: 6px; background: #6c63ff; color: #fff; cursor: pointer; font-size: 14px; }
    button:hover { background: #5a51e5; }
    input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    .status { margin-top: 10px; color: #666; }
    iframe { width: 100%; height: 120px; border: 1px solid #ddd; border-radius: 6px; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>AgentDock Browser Fixture</h1>
  <p>This page is used for integration testing of the embedded browser and Browser MCP tools.</p>
  <div>
    <button id="increment">Increment</button>
    <span class="counter" id="count">0</span>
  </div>
  <div style="margin-top: 20px;">
    <label for="name">Name: </label>
    <input id="name" type="text" placeholder="Type your name" />
    <button id="submit" onclick="submitName()">Submit</button>
    <div class="status" id="status"></div>
  </div>
  <div style="margin-top: 20px;">
    <label for="color">Color: </label>
    <select id="color">
      <option value="red">Red</option>
      <option value="green">Green</option>
      <option value="blue">Blue</option>
    </select>
  </div>
  <iframe srcdoc='<p>Inner iframe content</p>' title="test-iframe"></iframe>
  <script>
    let count = 0
    document.getElementById('increment').addEventListener('click', () => {
      count += 1
      document.getElementById('count').textContent = count
    })
    function submitName() {
      const name = document.getElementById('name').value
      document.getElementById('status').textContent = name ? 'Hello, ' + name + '!' : 'Please enter a name'
    }
  </script>
</body>
</html>
